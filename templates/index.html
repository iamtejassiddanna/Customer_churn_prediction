<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <meta name="description" content="AI-Powered Customer Churn Prediction Interface">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="container">
        <header class="app-header">
            <h1>Churn<span class="highlight">Predict</span></h1>
            <p>AI-Powered Customer Retention Analysis</p>
        </header>

        <div class="main-content">
            <form id="prediction-form" class="glass-panel">
                
                <section class="form-section">
                    <h2><span class="icon">👤</span> Demographics</h2>
                    <div class="grid-2">
                        <div class="input-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="SeniorCitizen">Senior Citizen</label>
                            <select id="SeniorCitizen" name="SeniorCitizen">
                                <option value="0">No (0)</option>
                                <option value="1">Yes (1)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="Partner">Partner</label>
                            <select id="Partner" name="Partner">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="Dependents">Dependents</label>
                            <select id="Dependents" name="Dependents">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <h2><span class="icon">📡</span> Services</h2>
                    <div class="grid-3">
                        <div class="input-group">
                            <label for="PhoneService">Phone Service</label>
                            <select id="PhoneService" name="PhoneService">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="MultipleLines">Multiple Lines</label>
                            <select id="MultipleLines" name="MultipleLines">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No phone service">No phone service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="InternetService">Internet Service</label>
                            <select id="InternetService" name="InternetService">
                                <option value="Fiber optic">Fiber optic</option>
                                <option value="DSL">DSL</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="OnlineSecurity">Online Security</label>
                            <select id="OnlineSecurity" name="OnlineSecurity">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="OnlineBackup">Online Backup</label>
                            <select id="OnlineBackup" name="OnlineBackup">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="DeviceProtection">Device Protection</label>
                            <select id="DeviceProtection" name="DeviceProtection">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="TechSupport">Tech Support</label>
                            <select id="TechSupport" name="TechSupport">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="StreamingTV">Streaming TV</label>
                            <select id="StreamingTV" name="StreamingTV">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="StreamingMovies">Streaming Movies</label>
                            <select id="StreamingMovies" name="StreamingMovies">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <h2><span class="icon">💳</span> Account & Billing</h2>
                    <div class="grid-3">
                        <div class="input-group">
                            <label for="tenure">Tenure (Months)</label>
                            <input type="number" id="tenure" name="tenure" value="12" min="0">
                        </div>
                        <div class="input-group">
                            <label for="Contract">Contract</label>
                            <select id="Contract" name="Contract">
                                <option value="Month-to-month">Month-to-month</option>
                                <option value="One year">One year</option>
                                <option value="Two year">Two year</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="PaperlessBilling">Paperless Billing</label>
                            <select id="PaperlessBilling" name="PaperlessBilling">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group" style="grid-column: span 3;">
                            <label for="PaymentMethod">Payment Method</label>
                            <select id="PaymentMethod" name="PaymentMethod">
                                <option value="Electronic check">Electronic check</option>
                                <option value="Mailed check">Mailed check</option>
                                <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                                <option value="Credit card (automatic)">Credit card (automatic)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="MonthlyCharges">Monthly Charges ($)</label>
                            <input type="number" id="MonthlyCharges" name="MonthlyCharges" value="70.5" step="0.1">
                        </div>
                        <div class="input-group" style="grid-column: span 2;">
                            <label for="TotalCharges">Total Charges ($)</label>
                            <input type="number" id="TotalCharges" name="TotalCharges" value="846" step="0.1">
                        </div>
                    </div>
                </section>

                <button type="submit" id="predict-btn" class="primary-btn">
                    <span>Analyze Customer</span>
                    <div class="spinner" id="btn-spinner" style="display: none;"></div>
                </button>
            </form>

            <div class="result-panel glass-panel" id="result-panel" style="display: none;">
                <h3>Prediction Result</h3>
                <div class="result-content">
                    <div class="churn-status" id="churn-status">
                        <span class="status-icon" id="status-icon">❓</span>
                        <h2 id="prediction-text">Calculating...</h2>
                    </div>
                    <div class="probability-container">
                        <div class="prob-label">Churn Probability</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="prob-fill"></div>
                        </div>
                        <div class="prob-value" id="prob-value">0%</div>
                    </div>
                    <p class="insight-text" id="insight-text"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
